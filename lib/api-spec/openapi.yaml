openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Bin Al-Zain Shop API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: products
    description: Product operations
  - name: categories
    description: Category operations
  - name: admin
    description: Admin authentication
  - name: orders
    description: Order operations
  - name: auth
    description: Customer authentication
  - name: customers
    description: Customer management
  - name: Storage
    description: Object storage upload and serving endpoints.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List all products
      parameters:
        - name: categoryId
          in: query
          required: false
          schema:
            type: ["integer", "null"]
        - name: featured
          in: query
          required: false
          schema:
            type: ["boolean", "null"]
        - name: search
          in: query
          required: false
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/featured:
    get:
      operationId: getFeaturedProducts
      tags: [products]
      summary: Get featured products for homepage
      responses:
        "200":
          description: Featured products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get product by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
    put:
      operationId: updateProduct
      tags: [products]
      summary: Update a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all product categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /categories/{id}:
    get:
      operationId: getCategory
      tags: [categories]
      summary: Get category by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    put:
      operationId: updateCategory
      tags: [categories]
      summary: Update a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /admin/login:
    post:
      operationId: adminLogin
      tags: [admin]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginInput"
      responses:
        "200":
          description: Login success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSession"
        "401":
          description: Invalid credentials

  /admin/logout:
    post:
      operationId: adminLogout
      tags: [admin]
      summary: Admin logout
      responses:
        "200":
          description: Logged out

  /admin/me:
    get:
      operationId: adminMe
      tags: [admin]
      summary: Check admin session
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSession"
        "401":
          description: Not authenticated

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get dashboard stats
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/customers:
    get:
      operationId: listCustomers
      tags: [customers]
      summary: List all registered customers (admin only)
      responses:
        "200":
          description: List of customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CustomerProfile"
        "401":
          description: Not authenticated

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List all orders
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: ["string", "null"]
            enum: ["pending", "confirmed", "completed", "cancelled", null]
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Create an order (called before WhatsApp redirect)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get order by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
    patch:
      operationId: updateOrderStatus
      tags: [orders]
      summary: Update order status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderStatusUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /auth/register:
    post:
      operationId: registerCustomer
      tags: [auth]
      summary: Register a new customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerRegistration"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerProfile"
        "409":
          description: Email already in use

  /auth/login:
    post:
      operationId: loginCustomer
      tags: [auth]
      summary: Customer login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerLogin"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerProfile"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: logoutCustomer
      tags: [auth]
      summary: Customer logout
      responses:
        "200":
          description: Logged out

  /auth/me:
    get:
      operationId: getAuthMe
      tags: [auth]
      summary: Get current customer session
      responses:
        "200":
          description: Authenticated customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerProfile"
        "401":
          description: Not authenticated

  /auth/profile:
    patch:
      operationId: updateProfile
      tags: [auth]
      summary: Update customer profile (name, phone, password)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileInput"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerProfile"
        "400":
          description: Validation error
        "401":
          description: Not authenticated

  /profile/orders:
    get:
      operationId: getMyOrders
      tags: [auth]
      summary: Get orders for the currently logged-in customer
      responses:
        "200":
          description: List of customer orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
        "401":
          description: Not authenticated

  /notifications:
    get:
      operationId: getNotifications
      tags: [notifications]
      summary: Get notifications for logged-in customer (broadcast + targeted)
      responses:
        "200":
          description: List of notifications with read status
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"
        "401":
          description: Not authenticated

  /notifications/read-all:
    post:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        "401":
          description: Not authenticated

  /notifications/read/{id}:
    post:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark a single notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean

  /admin/notifications:
    get:
      operationId: listAdminNotifications
      tags: [notifications]
      summary: List all notifications (admin)
      responses:
        "200":
          description: All notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminNotification"
        "401":
          description: Not authenticated
    post:
      operationId: createNotification
      tags: [notifications]
      summary: Create and send a notification (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNotificationInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminNotification"
        "401":
          description: Not authenticated

  /admin/notifications/{id}:
    delete:
      operationId: deleteNotification
      tags: [notifications]
      summary: Delete a notification (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Not authenticated

  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Missing or invalid required fields.
        '500':
          description: Failed to generate upload URL.

  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an uploaded object
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: Object not found.

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Category:
      type: object
      required: [id, nameAr, nameEn, slug, icon]
      properties:
        id:
          type: integer
        nameAr:
          type: string
        nameEn:
          type: string
        slug:
          type: string
        icon:
          type: string
        imageUrl:
          type: ["string", "null"]
        productCount:
          type: integer
        rowNumber:
          type: integer

    CategoryInput:
      type: object
      required: [nameAr, nameEn, slug, icon]
      properties:
        nameAr:
          type: string
        nameEn:
          type: string
        slug:
          type: string
        icon:
          type: string
        imageUrl:
          type: ["string", "null"]
        rowNumber:
          type: integer

    Product:
      type: object
      required: [id, nameAr, nameEn, price, unit, categoryId, inStock]
      properties:
        id:
          type: integer
        nameAr:
          type: string
        nameEn:
          type: string
        descriptionAr:
          type: ["string", "null"]
        descriptionEn:
          type: ["string", "null"]
        price:
          type: number
        unit:
          type: string
        pricePerUnit:
          type: ["string", "null"]
        categoryId:
          type: integer
        categoryNameAr:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        inStock:
          type: boolean
        featured:
          type: boolean
        soldByWeight:
          type: boolean
        availableWeights:
          type: ["array", "null"]
          items:
            type: number
        allowCustomWeight:
          type: boolean

    ProductInput:
      type: object
      required: [nameAr, nameEn, price, unit, categoryId]
      properties:
        nameAr:
          type: string
        nameEn:
          type: string
        descriptionAr:
          type: ["string", "null"]
        descriptionEn:
          type: ["string", "null"]
        price:
          type: number
        unit:
          type: string
        categoryId:
          type: integer
        imageUrl:
          type: ["string", "null"]
        inStock:
          type: boolean
        featured:
          type: boolean
        soldByWeight:
          type: boolean
        availableWeights:
          type: ["array", "null"]
          items:
            type: number
        allowCustomWeight:
          type: boolean

    AdminLoginInput:
      type: object
      required: [password]
      properties:
        password:
          type: string

    AdminSession:
      type: object
      required: [authenticated]
      properties:
        authenticated:
          type: boolean

    AdminStats:
      type: object
      required: [totalProducts, totalCategories, totalOrders, pendingOrders, outOfStockProducts]
      properties:
        totalProducts:
          type: integer
        totalCategories:
          type: integer
        totalOrders:
          type: integer
        pendingOrders:
          type: integer
        outOfStockProducts:
          type: integer

    OrderItem:
      type: object
      required: [productId, nameAr, price, quantity]
      properties:
        productId:
          type: integer
        nameAr:
          type: string
        price:
          type: number
        quantity:
          type: integer
        selectedWeight:
          type: ["number", "null"]
        lineTotal:
          type: number

    Order:
      type: object
      required: [id, items, totalPrice, status, createdAt]
      properties:
        id:
          type: integer
        customerName:
          type: ["string", "null"]
        customerPhone:
          type: ["string", "null"]
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        totalPrice:
          type: number
        status:
          type: string
          enum: [pending, confirmed, completed, cancelled]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string

    OrderInput:
      type: object
      required: [items, totalPrice]
      properties:
        customerName:
          type: ["string", "null"]
        customerPhone:
          type: ["string", "null"]
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        totalPrice:
          type: number
        notes:
          type: ["string", "null"]

    OrderStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [pending, confirmed, completed, cancelled]
        notes:
          type: ["string", "null"]

    CustomerProfile:
      type: object
      required: [id, fullName, phone, email, createdAt]
      properties:
        id:
          type: integer
        fullName:
          type: string
        phone:
          type: string
        email:
          type: string
        createdAt:
          type: string

    CustomerRegistration:
      type: object
      required: [fullName, phone, email, password]
      properties:
        fullName:
          type: string
        phone:
          type: string
        email:
          type: string
        password:
          type: string

    CustomerLogin:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    UpdateProfileInput:
      type: object
      properties:
        fullName:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        currentPassword:
          type: ["string", "null"]
        newPassword:
          type: ["string", "null"]

    Notification:
      type: object
      required: [id, type, title, body, createdAt, isRead]
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [offer, discount, warning]
        title:
          type: string
        body:
          type: string
        customerId:
          type: ["integer", "null"]
        createdAt:
          type: string
        isRead:
          type: boolean

    AdminNotification:
      type: object
      required: [id, type, title, body, createdAt]
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [offer, discount, warning]
        title:
          type: string
        body:
          type: string
        customerId:
          type: ["integer", "null"]
        customerName:
          type: ["string", "null"]
        createdAt:
          type: string

    CreateNotificationInput:
      type: object
      required: [type, title, body]
      properties:
        type:
          type: string
          enum: [offer, discount, warning]
        title:
          type: string
        body:
          type: string
        customerId:
          type: ["integer", "null"]

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
          description: Original file name.
        size:
          type: integer
          minimum: 1
          description: File size in bytes.
        contentType:
          type: string
          minLength: 1
          description: MIME type of the file (e.g. `image/jpeg`).
    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
          description: Presigned GCS URL for PUT upload.
        objectPath:
          type: string
          description: Normalized object path (e.g. `/objects/uploads/uuid`). Store this in the database.
        metadata:
          $ref: '#/components/schemas/UploadUrlRequest'
